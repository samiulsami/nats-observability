apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nats-jetstream-rules
  namespace: monitoring # Or the namespace where your Prometheus is running
  labels:
    # These labels are often used by the Prometheus Operator to discover rules.
    # Adjust them to match your Prometheus Operator's configuration if needed.
    app: prometheus-operator
    release: prometheus
spec:
  # The 'groups' array contains the alerting rule definitions.
  groups:
  - name: nats-jetstream-resource-utilization
    rules:
    # --- 1. Resource Utilization (Most Critical) ---
    - alert: NatsJetStreamHighMemoryUsage
      expr: (nats_varz_jetstream_stats_memory / nats_varz_jetstream_config_max_memory * 100) > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "NATS JetStream high memory usage (instance {{ $labels.server_id }})"
        description: "JetStream memory usage is at {{ $value | printf \"%.2f\" }}%, which is above the 90% threshold.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsJetStreamHighStorageUsage
      expr: (nats_varz_jetstream_stats_storage / nats_varz_jetstream_config_max_storage * 100) > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "NATS JetStream high storage usage (instance {{ $labels.server_id }})"
        description: "JetStream storage usage is at {{ $value | printf \"%.2f\" }}%, which is above the 90% threshold.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - name: nats-jetstream-consumer-health
    rules:
    # --- 2. Consumer Health (Critical for Operations) ---
    - alert: NatsJetStreamHighPendingMessages
      expr: jetstream_consumer_num_pending > 5000
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "High number of pending messages for consumer {{ $labels.consumer }} on stream {{ $labels.stream }}"
        description: "Consumer {{ $labels.consumer }} on stream {{ $labels.stream }} has {{ $value }} pending messages, exceeding the 5000 threshold. The consumer may be slow or down.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsJetStreamHighAckPending
      expr: jetstream_consumer_num_ack_pending > 2000
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "High number of unacknowledged messages for consumer {{ $labels.consumer }} on stream {{ $labels.stream }}"
        description: "Consumer {{ $labels.consumer }} on stream {{ $labels.stream }} has {{ $value }} messages pending acknowledgement (ack), exceeding the 2000 threshold. This could indicate a processing issue.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsJetStreamConsumerStalled
      expr: rate(jetstream_consumer_delivered_consumer_seq[5m]) == 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "NATS consumer appears stalled (consumer {{ $labels.consumer }} on stream {{ $labels.stream }})"
        description: "Consumer {{ $labels.consumer }} on stream {{ $labels.stream }} has not processed any new messages in the last 15 minutes. It may be stuck or have crashed.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - name: nats-jetstream-stream-performance
    rules:
    # --- 3. Stream Performance ---
    - alert: NatsJetStreamHighMessageCount
      # This is a context-aware alert. The threshold should be adjusted
      # based on the expected size of a specific stream.
      expr: jetstream_stream_total_messages > 1000000
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "High message count on stream {{ $labels.stream }}"
        description: "Stream {{ $labels.stream }} has {{ $value | printf \"%.0f\" }} messages, which exceeds the generic threshold of 1,000,000. Please verify if this is expected.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsJetStreamHighStreamSize
      # This is a context-aware alert. The threshold (in bytes) should be
      # adjusted based on the expected size of a specific stream.
      expr: jetstream_stream_total_bytes > 10737418240 # 10 GB
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "High stream size on stream {{ $labels.stream }}"
        description: "Stream {{ $labels.stream }} is using {{ $value | humanizeBytes }}, which exceeds the generic threshold of 10GB. Please verify if this is expected.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsJetStreamNoIngestion
      expr: rate(jetstream_stream_last_seq[10m]) == 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "No new messages ingested on stream {{ $labels.stream }}"
        description: "Stream {{ $labels.stream }} has not received any new messages in the last 15 minutes. The producers for this stream might be down.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    # Note: Monitoring for message loss often requires custom logic or using NATS advisories,
    # as there isn't a direct 'deleted_messages' counter in the standard exporter.
  - name: nats-connectivity
    rules:
    # --- 4. Connectivity ---
    - alert: NatsSuddenConnectionDrop
      expr: changes(nats_varz_connections[5m]) > 5 AND deriv(nats_varz_connections[5m]) < 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Sudden drop in NATS connections (instance {{ $labels.server_id }})"
        description: "The number of active connections to NATS server {{ $labels.server_id }} has dropped significantly over the last 5 minutes. This could indicate a client-side issue or network problem.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsHighActiveConnections
      expr: nats_varz_connections > 1000  # Adjust based on expected load
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High active connections"
        description: "Active connections exceed 1,000: {{ $value }}. Monitor for load spikes or connection leaks."
  - name: nats-consumer-management
    rules:
    # --- 5. Consumer Management ---
    - alert: NatsSuddenConsumerDrop
      expr: changes(jetstream_server_total_consumers[5m]) > 2 AND deriv(jetstream_server_total_consumers[5m]) < 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Sudden drop in total NATS consumers (instance {{ $labels.server_id }})"
        description: "The total number of consumers on NATS server {{ $labels.server_id }} has dropped significantly. This might indicate a deployment or application failure.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: NatsHighTotalConsumers
      expr: jetstream_server_total_consumers > 100 # Adjust based on resource allocation
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High total consumers"
        description: "Total consumers exceed 100: {{ $value }}. Review resource allocation and consumer scaling."